<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reloj Minero — San Juan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C8891E;--copper:#C06040;
  --bg:#F4F2EE;--bg2:#FFFFFF;--bg3:#F0EDE8;--bg4:#E8E4DC;
  --border:#DDD9D0;--border2:#C8C0B0;
  --text1:#1A1A1A;--text2:#5A5448;--text3:#9A9080;
  --c-cierre:#8B5E3C;--c-prod:#1E7A45;--c-preprod:#1A5FA0;
  --c-expav:#7A4A1A;--c-exp:#5A2D6E;--c-prosp:#607090;--c-lat:#404858;
  --shadow:0 2px 12px rgba(0,0,0,.07);
}
body{background:var(--bg);color:var(--text1);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
.header{padding:20px 28px 16px;border-bottom:1px solid var(--border);background:var(--bg2);position:relative}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--copper),transparent)}
.h-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.h-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:5px;color:var(--gold);line-height:1}
.h-sub{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.h-right{text-align:right;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);line-height:1.7}
.h-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.stat-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 11px;font-family:'DM Mono',monospace;font-size:10px;display:flex;gap:6px;align-items:center}
.stat-num{color:var(--gold);font-weight:500}.stat-lbl{color:var(--text3)}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:8px 28px;border-bottom:1px solid var(--border);background:var(--bg2)}
.leg-item{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.5px;color:var(--text3)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.filters{display:flex;gap:6px;flex-wrap:wrap;padding:10px 28px;border-bottom:1px solid var(--border);align-items:center}
.f-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--text3);margin-right:4px;text-transform:uppercase}
.fbtn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.5px;padding:3px 10px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;border-radius:2px;transition:all .15s}
.fbtn:hover{border-color:var(--text2);color:var(--text1)}.fbtn.on{background:var(--text1);color:var(--bg);border-color:var(--text1)}
.f-count{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);margin-left:auto}
.content{padding:20px 28px 40px}
.sec-head{display:flex;align-items:center;gap:10px;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.sec-head:first-child{margin-top:0}
.sec-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sec-label{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px}
.sec-badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.card{background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:transform .15s,box-shadow .15s;padding:12px 10px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;overflow:hidden}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.card-top{width:100%;display:flex;justify-content:flex-end}
.card-metal{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--text3);text-transform:uppercase}
.cw{margin:2px 0}
.card-hora{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;line-height:1;margin-top:2px}
.card-name{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;text-align:center;line-height:1.2;color:var(--text1)}
.card-emp{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);text-align:center;line-height:1.3;margin-top:1px}
.card-depto{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);text-align:center}
.frozen-tag{position:absolute;top:5px;left:6px;font-size:11px;opacity:.6}
#overlay{display:none;position:fixed;inset:0;background:rgba(20,16,10,.72);z-index:200;align-items:center;justify-content:center;padding:16px}
#overlay.on{display:flex}
.modal{background:var(--bg2);max-width:520px;width:100%;max-height:90vh;overflow-y:auto;border-top:3px solid var(--gold);box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-close{float:right;margin:10px 10px 0 0;width:26px;height:26px;background:var(--text1);color:var(--bg2);border:none;cursor:pointer;font-size:14px;line-height:26px;text-align:center}
.modal-hdr{padding:18px 20px 12px;clear:both}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;line-height:1}
.modal-owner{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.5px;margin-top:3px}
.modal-clock-row{display:flex;align-items:center;gap:16px;padding:12px 20px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.modal-hora-big{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;line-height:1}
.modal-clock-info{flex:1}
.modal-etapa-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:2px;display:inline-block;margin-bottom:6px;border:1px solid}
.modal-desc{font-size:12px;color:var(--text2);line-height:1.55}
.modal-sec{padding:12px 20px;border-bottom:1px solid var(--border)}
.modal-sec:last-child{border-bottom:none}
.modal-sec h4{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.modal-sec p,.modal-sec li{font-size:12px;color:var(--text2);line-height:1.55}
.modal-sec ul{padding-left:14px}
.fbar-row{margin-bottom:7px}
.fbar-top{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:3px}
.fbar-track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.fbar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.htable{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px}
.htable th{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);text-align:left;padding:3px 5px;border-bottom:1px solid var(--border);font-weight:400;letter-spacing:.5px}
.htable td{padding:5px 5px;border-bottom:.5px solid var(--border);color:var(--text2);vertical-align:middle}
.htable td:nth-child(3),.htable td:nth-child(4){font-family:'DM Mono',monospace;font-weight:500;color:var(--text1);text-align:center}
.htable td:nth-child(5){font-family:'DM Mono',monospace;font-size:10px;text-align:center;color:var(--text3)}
.stage-sm{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
.divider-12{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);text-align:center;padding:5px;margin:4px 0;border-top:.5px dashed var(--border);border-bottom:.5px dashed var(--border);background:var(--bg3)}
@media(max-width:600px){
  .header,.legend,.filters,.content{padding-left:14px;padding-right:14px}
  .grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .h-title{font-size:26px}
}
</style>
</head>
<body>
<div class="header">
  <div class="h-top">
    <div>
      <div class="h-title">RELOJ MINERO</div>
      <div class="h-sub">San Juan · Argentina · <span id="upd"></span></div>
    </div>
    <div class="h-right">00:00 = Inicio del ciclo&nbsp;&nbsp;|&nbsp;&nbsp;12:00 = Primera voladura / producción&nbsp;&nbsp;|&nbsp;&nbsp;24:00 = Cierre de mina</div>
  </div>
  <div class="h-stats">
    <div class="stat-pill"><span class="stat-num" id="cnt-total">—</span><span class="stat-lbl">proyectos</span></div>
    <div class="stat-pill"><span class="stat-num" id="cnt-prod">—</span><span class="stat-lbl">en producción / cierre</span></div>
    <div class="stat-pill"><span class="stat-num" id="cnt-dev">—</span><span class="stat-lbl">pre-producción</span></div>
    <div class="stat-pill"><span class="stat-num" id="cnt-exp">—</span><span class="stat-lbl">en exploración</span></div>
    <div class="stat-pill"><span class="stat-num" id="cnt-lat">—</span><span class="stat-lbl">latentes</span></div>
  </div>
</div>
<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-cierre)"></div>CIERRE</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-prod)"></div>PRODUCCIÓN</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-preprod)"></div>PRE-PRODUCCIÓN</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-expav)"></div>EXPLORACIÓN AVANZADA</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-exp)"></div>EXPLORACIÓN</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-prosp)"></div>PROSPECTO</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--c-lat)"></div>LATENTE</div>
</div>
<div class="filters">
  <span class="f-label">FILTRAR</span>
  <button class="fbtn on" onclick="setFilter('all',this)">Todos</button>
  <button class="fbtn" onclick="setFilter('cierre',this)">Cierre</button>
  <button class="fbtn" onclick="setFilter('produccion',this)">Producción</button>
  <button class="fbtn" onclick="setFilter('preproduccion',this)">Pre-prod</button>
  <button class="fbtn" onclick="setFilter('exploracion_avanzada',this)">Expl. avanzada</button>
  <button class="fbtn" onclick="setFilter('exploracion',this)">Exploración</button>
  <button class="fbtn" onclick="setFilter('prospecto',this)">Prospecto</button>
  <button class="fbtn" onclick="setFilter('latente',this)">Latente</button>
  <span class="f-count" id="fcount"></span>
</div>
<div class="content" id="content"></div>
<div id="overlay" onclick="closeModal(event)">
  <div class="modal"><button class="modal-close" onclick="closeModal({target:{id:'overlay'}})">✕</button><div id="modal-inner"></div></div>
</div>

function horaToDecimal(s){const[h,m]=s.split(':').map(Number);return h+m/60;}
function ampm(s){const[h]=s.split(':').map(Number);return h<12?'AM':'PM';}
// Aguja horaria: esfera 12hs. 03:00→apunta al 3. 19:30→apunta entre 7 y 8.
function hourAngle(s){const[h,m]=s.split(':').map(Number);return((h%12*60+m)/(12*60))*Math.PI*2-Math.PI/2;}
// Aguja de minutos
function minAngle(s){const[,m]=s.split(':').map(Number);return(m/60)*Math.PI*2-Math.PI/2;}
// Arco ciclo: 24hs completas → vuelta completa del arco de fondo
function cycleAngle(s){const[h,m]=s.split(':').map(Number);return((h*60+m)/(24*60))*Math.PI*2-Math.PI/2;}

function drawClock(canvas,horaStr,etapa,frozen){
  const ec=EC[etapa]||EC.prospecto;
  const ctx=canvas.getContext('2d');
  const s=canvas.width,cx=s/2,cy=s/2,r=s/2-3;
  ctx.clearRect(0,0,s,s);
  // Face
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#FAFAF8';ctx.fill();
  ctx.strokeStyle=ec.hex;ctx.lineWidth=1.8;ctx.stroke();
  // Arco de progreso del ciclo 24hs (fondo tintado, igual estética que el original)
  const cycAng=cycleAngle(horaStr);
  ctx.beginPath();ctx.arc(cx,cy,r-4,-Math.PI/2,cycAng);
  ctx.strokeStyle=ec.hex+'20';ctx.lineWidth=r-10;ctx.stroke();
  // 12 ticks de hora (misma estética: largos en cardinales, cortos el resto)
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2-Math.PI/2,main=i%3===0;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*(r-(main?9:5)),cy+Math.sin(a)*(r-(main?9:5)));
    ctx.lineTo(cx+Math.cos(a)*(r-2),cy+Math.sin(a)*(r-2));
    ctx.strokeStyle=main?'#C8C0B0':'#E8E4DC';ctx.lineWidth=main?1.2:0.5;ctx.stroke();
  }
  // Aguja de minutos (fina, neutra)
  const mAng=minAngle(horaStr);
  ctx.beginPath();
  ctx.moveTo(cx-Math.cos(mAng)*r*0.10,cy-Math.sin(mAng)*r*0.10);
  ctx.lineTo(cx+Math.cos(mAng)*r*0.72,cy+Math.sin(mAng)*r*0.72);
  ctx.strokeStyle='#C8C0B0';ctx.lineWidth=1;ctx.lineCap='round';ctx.stroke();
  // Aguja horaria (gruesa, color de etapa)
  const hAng=hourAngle(horaStr);
  if(frozen)ctx.setLineDash([4,3]);
  ctx.beginPath();
  ctx.moveTo(cx-Math.cos(hAng)*r*0.14,cy-Math.sin(hAng)*r*0.14);
  ctx.lineTo(cx+Math.cos(hAng)*r*0.60,cy+Math.sin(hAng)*r*0.60);
  ctx.strokeStyle=frozen?ec.hex+'88':ec.hex;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  if(frozen)ctx.setLineDash([]);
  // Center dot
  ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fillStyle=ec.hex;ctx.fill();
}

let allData=[],activeFilter='all';

function render(){
  const cont=document.getElementById('content');cont.innerHTML='';
  const filtered=activeFilter==='all'?allData:allData.filter(p=>p.etapa===activeFilter);
  document.getElementById('fcount').textContent=filtered.length+' proyecto'+(filtered.length!==1?'s':'');
  ORDER.forEach(etapa=>{
    const items=filtered.filter(p=>p.etapa===etapa);if(!items.length)return;
    const ec=EC[etapa];
    const sec=document.createElement('div');
    const head=document.createElement('div');head.className='sec-head';
    head.innerHTML=`<span class="sec-dot" style="background:${ec.hex}"></span><span class="sec-label" style="color:${ec.hex}">${ec.label}</span><span class="sec-badge" style="color:${ec.hex};border-color:${ec.hex}33;background:${ec.hex}0D">${items.length}</span>`;
    sec.appendChild(head);
    const grid=document.createElement('div');grid.className='grid';
    items.sort((a,b)=>{
      const toM=s=>{const[h,m]=s.split(':').map(Number);return h*60+m;};
      return(etapa==='cierre'||etapa==='produccion')?toM(b.hora)-toM(a.hora):toM(a.hora)-toM(b.hora);
    });
    items.forEach(p=>{
      const ec2=EC[p.etapa]||EC.prospecto;
      const card=document.createElement('div');card.className='card';card.onclick=()=>openModal(p);
      card.innerHTML=`<div class="card-top"><span class="card-metal">${p.metal}</span><span style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:${ec2.hex};opacity:.7">${ampm(p.hora)}</span></div><div class="cw"><canvas width="84" height="84" style="width:84px;height:84px"></canvas></div><div class="card-hora" style="color:${ec2.hex}">${p.hora}</div><div class="card-name">${p.nombre}</div><div class="card-emp">${p.empresa}</div><div class="card-depto">${p.depto||''}</div>${p.frozen?'<div class="frozen-tag">⏸</div>':''}`;
      const bar=document.createElement('div');bar.style=`position:absolute;top:0;left:0;right:0;height:2px;background:${ec2.hex}`;
      card.appendChild(bar);
      grid.appendChild(card);
      drawClock(card.querySelector('canvas'),p.hora,p.etapa,p.frozen||false);
    });
    sec.appendChild(grid);cont.appendChild(sec);
  });
}

function openModal(p){
  const ec=EC[p.etapa]||EC.prospecto;
  let histHTML='';
  if(p.historial&&p.historial.length){
    const rows=p.historial.map(h=>`<tr><td><span class="stage-sm" style="background:${h.c}"></span>${h.n}</td><td style="color:var(--text3)">${h.a}</td><td>${h.dur}</td><td><strong>${h.hs}</strong></td><td>${h.hi}</td></tr>`).join('');
    histHTML=`<div class="modal-sec"><h4>Ciclo de vida — equivalencia en el reloj de 24hs</h4>${p.nota_hist?`<p style="font-style:italic;margin-bottom:8px;font-size:11px">${p.nota_hist}</p>`:''}<div class="divider-12">00:00 → Pre-producción → 12:00 &nbsp;·&nbsp; 12:00 → Post-producción → 24:00</div><table class="htable"><thead><tr><th>Etapa</th><th>Período</th><th>Años</th><th>Hs reloj</th><th>Inicio</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }
  let factHTML='';
  if(p.factores&&p.factores.length){
    const bars=p.factores.map(f=>`<div class="fbar-row"><div class="fbar-top"><span>${f.l}</span><span>${f.v}%</span></div><div class="fbar-track"><div class="fbar-fill" style="width:${f.v}%;background:${ec.hex}"></div></div></div>`).join('');
    factHTML=`<div class="modal-sec"><h4>Factores que determinan la posición en el reloj</h4>${bars}</div>`;
  }
  const sz=110;
  document.getElementById('modal-inner').innerHTML=`<div class="modal-hdr"><div class="modal-title" style="color:${ec.hex}">${p.nombre}</div><div class="modal-owner">${p.empresa} · ${p.depto||''} · ${p.metal||''}${p.frozen?' · ⏸ CONGELADO':''}</div></div><div class="modal-clock-row"><canvas id="mc" width="${sz}" height="${sz}" style="width:${sz}px;height:${sz}px;flex-shrink:0"></canvas><div class="modal-clock-info"><div class="modal-hora-big" style="color:${ec.hex}">${p.hora}</div><span class="modal-etapa-tag" style="color:${ec.hex};border-color:${ec.hex}40;background:${ec.hex}12">${ec.label}</span><p class="modal-desc">${p.desc||''}</p></div></div><div class="modal-sec"><h4>Recursos / Reservas</h4><p>${p.recursos||'Sin datos publicados.'}</p></div>${histHTML}${factHTML}`;
  document.getElementById('overlay').classList.add('on');
  drawClock(document.getElementById('mc'),p.hora,p.etapa,p.frozen||false);
}

function closeModal(e){if(e.target.id==='overlay')document.getElementById('overlay').classList.remove('on');}
function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();
}
async function loadSheet(url){
  try{
    const r=await fetch(url);const t=await r.text();
    const lines=t.trim().split('\n');const hdrs=lines[0].split(',').map(h=>h.trim().toLowerCase());
    return lines.slice(1).map(l=>{const v=l.split(',');const o={};hdrs.forEach((h,i)=>o[h]=(v[i]||'').trim().replace(/^"|"$/g,''));return o;}).filter(r=>r.nombre);
  }catch(e){return null;}
}
async function init(){
  document.getElementById('upd').textContent=new Date().toLocaleDateString('es-AR',{month:'long',year:'numeric'});
  let data=null;if(SHEET_CSV_URL)data=await loadSheet(SHEET_CSV_URL);
  allData=data||DATA;
  const prod=allData.filter(p=>p.etapa==='produccion').length;
  const cier=allData.filter(p=>p.etapa==='cierre').length;
  document.getElementById('cnt-total').textContent=allData.length;
  document.getElementById('cnt-prod').textContent=prod+cier;
  document.getElementById('cnt-dev').textContent=allData.filter(p=>p.etapa==='preproduccion').length;
  document.getElementById('cnt-exp').textContent=allData.filter(p=>['exploracion_avanzada','exploracion','prospecto'].includes(p.etapa)).length;
  document.getElementById('cnt-lat').textContent=allData.filter(p=>p.etapa==='latente').length;
  render();
}
